<svg width="100%" viewBox="0 0 820 506" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Credential Sentinel architecture</title>
<desc>A system diagram of Credential Sentinel: a Next.js frontend talks REST and SSE to a FastAPI backend, which runs a LangGraph agent. The agent calls Nebius to draft the plan and persists state, events, and audit to SQLite. It discovers credentials from live sources (a config scan, a real TLS checker, and a token scan, the first and last simulated) and reconciles them against managed inventory (cert-manager, Vault, and AWS Secrets Manager, all simulated), guided by a policy file.</desc>
