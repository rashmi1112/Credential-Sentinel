services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sentinel_data:/app/data
    environment:
      ALLOWED_ORIGINS: "http://localhost:3000"
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL:-https://api.studio.nebius.com/v1/}
      NEBIUS_MODEL: ${NEBIUS_MODEL:-meta-llama/Llama-3.3-70B-Instruct}
      SENTINEL_TLS_MODE: ${SENTINEL_TLS_MODE:-real}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ------------------------------------------------------------------
  # vLLM profile: self-hosted inference (requires NVIDIA GPU on host).
  # Start with: docker compose --profile vllm up
  # The backend will use this instead of Nebius when NEBIUS_BASE_URL
  # is overridden to point at the vllm service.
  # ------------------------------------------------------------------
  vllm:
    profiles: [vllm]
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8000"
    command: >
      --model ${VLLM_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}
      --max-model-len 4096
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --dtype auto
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  sentinel_data:
