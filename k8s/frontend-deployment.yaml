apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-frontend
  namespace: sentinel
  labels:
    app: sentinel-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-frontend
  template:
    metadata:
      labels:
        app: sentinel-frontend
    spec:
      containers:
        - name: frontend
          # Build with: --build-arg NEXT_PUBLIC_API=https://api.yourdomain.com
          image: ghcr.io/YOUR_ORG/sentinel-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
