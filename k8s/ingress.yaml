apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-ingress
  namespace: sentinel
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # SSE streams stay open
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"       # required for SSE
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sentinel.yourdomain.com
        - api.sentinel.yourdomain.com
      secretName: sentinel-tls
  rules:
    - host: sentinel.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-frontend
                port:
                  number: 3000
    - host: api.sentinel.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-backend
                port:
                  number: 8000
