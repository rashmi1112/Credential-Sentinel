apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: sentinel
spec:
  selector:
    app: vllm-inference
  ports:
    - port: 8000
      targetPort: 8000
---
# To route the backend to the in-cluster vLLM instead of Nebius,
# patch the configmap:
#   kubectl patch configmap sentinel-config -n sentinel \
#     --patch '{"data":{"NEBIUS_BASE_URL":"http://vllm-service:8000/v1/","NEBIUS_MODEL":"meta-llama/Meta-Llama-3.1-8B-Instruct"}}'
# Then rollout restart the backend deployment.
